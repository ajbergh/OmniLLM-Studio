# Default nginx config for the OmniLLM-Studio frontend container.
#
# Topology assumptions for this baked-in default:
#   - "combined": the Go backend runs as a sidecar in the same Pod and is
#     reachable on 127.0.0.1:8080.
#
# For "split" topology, the Helm chart mounts a ConfigMap that replaces this
# file with a version that points proxy_pass at the backend Service DNS.

server {
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any unknown path returns index.html so React Router-style
    # client-side navigation works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived static assets: hashed filenames are immutable.
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # API + SSE proxy.
    location /v1/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # SSE: never buffer, never cache, hold the connection.
        proxy_buffering          off;
        proxy_cache              off;
        proxy_request_buffering  off;
        chunked_transfer_encoding on;

        # Backend WriteTimeout is 5 min; give ourselves headroom on both sides.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Allow large attachment uploads.
        client_max_body_size 100m;
    }

    # Health endpoint passthrough so kubelet probes can hit nginx without
    # bypassing the proxy chain.
    location = /healthz {
        access_log off;
        proxy_pass http://127.0.0.1:8080/v1/health;
        proxy_read_timeout 5s;
    }
}
