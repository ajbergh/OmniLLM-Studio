# Local smoke topology for OmniLLM-Studio container images.
#
# Run from the repository root with a durable 64-character hex key:
#   export OMNILLM_MASTER_KEY=$(openssl rand -hex 32)
#   docker compose -f deploy/docker/docker-compose.yaml up --build
#   open http://localhost:8081

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.backend
      args:
        VERSION: dev
        COMMIT: local
    image: omnillm-studio-backend:dev
    environment:
      OMNILLM_BIND_ADDRESS: 0.0.0.0
      OMNILLM_PORT: "8080"
      OMNILLM_DB_PATH: /data/omnillm-studio.db
      OMNILLM_ATTACHMENTS_DIR: /data/attachments
      OMNILLM_CHROMEM_DIR: /data/chromem
      OMNILLM_MAX_UPLOAD_BYTES: "524288000"
      # The key must remain stable for as long as the /data volume exists.
      OMNILLM_MASTER_KEY: "${OMNILLM_MASTER_KEY:?set OMNILLM_MASTER_KEY to 64 hex characters}"
      OMNILLM_CORS_ORIGINS: "http://localhost:8081"
    volumes:
      - omnillm-data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    image: omnillm-studio-frontend:dev
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8081"
    configs:
      - source: nginx_split
        target: /etc/nginx/conf.d/default.conf
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8081/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

configs:
  nginx_split:
    content: |
      server {
        listen 8081;
        root /usr/share/nginx/html;
        index index.html;
        location / { try_files $$uri $$uri/ /index.html; }
        location /v1/ {
          proxy_pass         http://backend:8080;
          proxy_http_version 1.1;
          proxy_set_header   Host              $$host;
          proxy_set_header   X-Real-IP         $$remote_addr;
          proxy_set_header   X-Forwarded-For   $$proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto $$scheme;
          proxy_set_header   Connection        "";
          proxy_buffering          off;
          proxy_cache              off;
          proxy_request_buffering  off;
          chunked_transfer_encoding on;
          proxy_read_timeout 600s;
          proxy_send_timeout 600s;
          client_max_body_size 500m;
        }
        location = /healthz {
          access_log off;
          proxy_pass http://backend:8080/v1/health;
          proxy_read_timeout 5s;
        }
      }

volumes:
  omnillm-data:
