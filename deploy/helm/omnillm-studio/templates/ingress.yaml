{{- include "omnillm-studio.validate" . -}}
{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "omnillm-studio.fullname" . }}
  labels:
    {{- include "omnillm-studio.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- with .Values.ingress.tls.secretName }}
      secretName: {{ . }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if eq .Values.topology "split" }}
          - path: /v1/
            pathType: Prefix
            backend:
              service:
                name: {{ include "omnillm-studio.backendName" . }}
                port:
                  number: {{ .Values.service.backendPort }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "omnillm-studio.frontendName" . }}
                port:
                  number: {{ .Values.service.port }}
          {{- else }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "omnillm-studio.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
          {{- end }}
{{- end -}}
