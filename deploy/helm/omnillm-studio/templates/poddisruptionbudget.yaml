{{- include "omnillm-studio.validate" . -}}
{{- if .Values.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "omnillm-studio.backendName" . }}
  labels:
    {{- include "omnillm-studio.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "omnillm-studio.backendSelectorLabels" . | nindent 6 }}
{{- end -}}
