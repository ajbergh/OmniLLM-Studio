{{- include "omnillm-studio.validate" . -}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "omnillm-studio.secretName" . }}
  labels:
    {{- include "omnillm-studio.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Hex-encoded 32-byte AES-256-GCM master key. Used by internal/crypto to
  # encrypt/decrypt provider API keys at rest.
  OMNILLM_MASTER_KEY: {{ .Values.secrets.encryptionKey | quote }}
{{- end }}
