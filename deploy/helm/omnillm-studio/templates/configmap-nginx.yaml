{{- include "omnillm-studio.validate" . -}}
{{- $proxyTarget := "" -}}
{{- if eq .Values.topology "combined" -}}
  {{- $proxyTarget = printf "http://127.0.0.1:%d" (int .Values.service.backendPort) -}}
{{- else -}}
  {{- $proxyTarget = printf "http://%s:%d" (include "omnillm-studio.backendName" .) (int .Values.service.backendPort) -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "omnillm-studio.nginxConfigMapName" . }}
  labels:
    {{- include "omnillm-studio.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.service.frontendPort }};
      server_name _;

      root /usr/share/nginx/html;
      index index.html;

      add_header X-Content-Type-Options "nosniff" always;
      add_header X-Frame-Options "DENY" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https: wss:; worker-src 'self' blob:; font-src 'self' data:" always;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location ~* \.(?:css|js|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
      }

      location /v1/ {
        proxy_pass         {{ $proxyTarget }};
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_buffering          off;
        proxy_cache              off;
        proxy_request_buffering  off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size {{ .Values.config.maxUploadSize }};
      }

      location = /healthz {
        access_log off;
        proxy_pass {{ $proxyTarget }}/v1/health;
        proxy_read_timeout 5s;
      }
    }
