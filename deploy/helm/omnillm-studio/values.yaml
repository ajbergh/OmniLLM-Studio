# Default values for omnillm-studio.
# See deploy/helm/omnillm-studio/README.md for installation guidance.

fullnameOverride: ""
nameOverride: ""

image:
  registry: ghcr.io
  repository: ajbergh/omnillm-studio
  backendTag: ""
  frontendTag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

topology: combined

# SQLite + chromem-go on local disk are single-writer.
replicaCount: 1

persistence:
  enabled: true
  storageClass: ""
  size: 20Gi
  accessModes:
    - ReadWriteOnce
  retainOnDelete: true

config:
  port: 8080
  corsOrigins: []
  allowPublicRegistration: false
  chromemCompress: false
  # Shared application/proxy limit. maxUploadBytes is passed to the Go backend;
  # maxUploadSize is rendered into nginx and should represent the same value.
  maxUploadBytes: "524288000"
  maxUploadSize: 500m
  extraEnv: []

# The Secret MUST contain OMNILLM_MASTER_KEY with 64 hex characters.
secrets:
  existingSecret: ""
  encryptionKey: ""

service:
  type: ClusterIP
  port: 80
  frontendPort: 8081
  backendPort: 8080

ingress:
  enabled: true
  className: nginx
  host: omnillm.local
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
  tls:
    enabled: false
    secretName: ""

resources:
  backend:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  frontend:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  startup:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 24

serviceAccount:
  create: true
  name: ""
  annotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
terminationGracePeriodSeconds: 30
podAnnotations: {}
podLabels: {}

networkPolicy:
  enabled: false
  ingressFrom: []

podDisruptionBudget:
  enabled: true
  minAvailable: 1
