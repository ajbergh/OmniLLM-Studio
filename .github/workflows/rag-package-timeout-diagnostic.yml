name: Final RAG Validation Record

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-package-timeout-diagnostic.yml'

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run bounded validation and publish results
        shell: bash
        run: |
          set +e
          mkdir -p backend/cmd/desktop/frontend_dist
          printf '<!doctype html><title>validation placeholder</title>' > backend/cmd/desktop/frontend_dist/index.html
          (cd backend && timeout 15m go test -timeout 3m ./...) >/tmp/backend.log 2>&1 & backend_pid=$!
          (cd backend && timeout 15m go test -race -timeout 5m ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document ./internal/api) >/tmp/race.log 2>&1 & race_pid=$!
          (cd frontend && timeout 15m bash -lc 'npm ci && npm run build && npm run lint && npm run test:unit') >/tmp/frontend.log 2>&1 & frontend_pid=$!
          wait "$backend_pid"; backend_status=$?
          wait "$race_pid"; race_status=$?
          wait "$frontend_pid"; frontend_status=$?
          git diff --check >/tmp/diff.log 2>&1
          diff_status=$?
          rm -rf backend/cmd/desktop/frontend_dist
          label() { if [ "$1" -eq 0 ]; then printf 'PASS'; elif [ "$1" -eq 124 ]; then printf 'TIMEOUT'; else printf 'FAIL'; fi; }
          python3 - "$(label "$backend_status")" "$(label "$race_status")" "$(label "$frontend_status")" "$(label "$diff_status")" <<'PY'
          from pathlib import Path
          import re, sys
          path = Path('docs/RAG_BACKEND_VALIDATION.md')
          text = path.read_text()
          table = f'''| Check | Result |
          |---|---|
          | `go test -timeout 3m ./...` | **{sys.argv[1]}** |
          | Focused Go race tests | **{sys.argv[2]}** |
          | Frontend build, lint, and unit tests | **{sys.argv[3]}** |
          | `git diff --check` | **{sys.argv[4]}** |'''
          text = re.sub(r'\| Check \| Result \|\n\|---\|---\|\n(?:\|.*\n){4}', table + '\n', text, count=1)
          note = '''

## Test harness correction

The initial repository-wide backend run timed out in `internal/agent.TestExecuteToolCallAskApprovalApproved`. Both approval tests used a one-slot event channel while forwarding every post-approval tool event, so the callback could block after the only consumer exited. The test callbacks now forward only `EventApprovalRequired`, which is the event under assertion. Production agent behavior was not changed.
'''
          if '## Test harness correction' not in text:
              text += note
          path.write_text(text)
          PY
          if [ "$backend_status" -ne 0 ]; then echo '--- backend ---'; tail -n 300 /tmp/backend.log; fi
          if [ "$race_status" -ne 0 ]; then echo '--- race ---'; tail -n 300 /tmp/race.log; fi
          if [ "$frontend_status" -ne 0 ]; then echo '--- frontend ---'; tail -n 300 /tmp/frontend.log; fi
          if [ "$diff_status" -ne 0 ]; then echo '--- diff ---'; cat /tmp/diff.log; fi
          rm -f .github/workflows/rag-package-timeout-diagnostic.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(rag): record final branch validation [skip ci]'
          git pull --rebase origin feature/rag-modernization-v2
          git push origin HEAD:feature/rag-modernization-v2
          if [ "$backend_status" -ne 0 ] || [ "$race_status" -ne 0 ] || [ "$frontend_status" -ne 0 ] || [ "$diff_status" -ne 0 ]; then
            exit 1
          fi
