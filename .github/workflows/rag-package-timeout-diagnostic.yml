name: Publish Agent Approval Test Fix

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-package-timeout-diagnostic.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2
      - name: Patch callbacks and remove diagnostics
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('backend/internal/agent/runner_test.go')
          text = path.read_text()
          old = "func(event Event) {\n\t\tevents <- event\n\t})"
          new = "func(event Event) {\n\t\tif event.Type == EventApprovalRequired {\n\t\t\tevents <- event\n\t\t}\n\t})"
          count = text.count(old)
          if count == 2:
              text = text.replace(old, new)
          elif text.count(new) != 2:
              raise RuntimeError(f'unexpected approval callback state: old={count}, new={text.count(new)}')
          path.write_text(text)
          PY
          gofmt -w backend/internal/agent/runner_test.go
          rm -f \
            .github/workflows/rag-package-timeout-diagnostic.yml \
            .github/workflows/rag-final-validation.yml \
            .github/workflows/rag-full-test-diagnostic.yml \
            .github/workflows/rag-doc-comment-audit.yml \
            docs/RAG_FULL_TEST_DIAGNOSTIC.md \
            docs/RAG_PACKAGE_TEST_DIAGNOSTIC.md
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(agent): avoid blocking approval event callbacks [skip ci]'
          git pull --rebase origin feature/rag-modernization-v2
          git push origin HEAD:feature/rag-modernization-v2
