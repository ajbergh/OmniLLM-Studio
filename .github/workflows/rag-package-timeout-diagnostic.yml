name: Identify RAG Backend Package Timeout

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-package-timeout-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: Run package-bounded backend suite
        shell: bash
        run: |
          set +e
          mkdir -p backend/cmd/desktop/frontend_dist
          printf '<!doctype html><title>validation placeholder</title>' > backend/cmd/desktop/frontend_dist/index.html
          (cd backend && timeout 8m go test -timeout 90s ./...) >/tmp/package-test.log 2>&1
          status=$?
          rm -rf backend/cmd/desktop/frontend_dist
          {
            echo '# Package-Bounded Backend Test Diagnostic'
            echo
            echo "Exit status: \`$status\`"
            echo
            echo '```text'
            tail -n 400 /tmp/package-test.log
            echo '```'
          } > docs/RAG_PACKAGE_TEST_DIAGNOSTIC.md
          rm -f .github/workflows/rag-package-timeout-diagnostic.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'build(rag): record package-bounded backend diagnostic [skip ci]'
          git pull --rebase origin feature/rag-modernization-v2
          git push origin HEAD:feature/rag-modernization-v2
