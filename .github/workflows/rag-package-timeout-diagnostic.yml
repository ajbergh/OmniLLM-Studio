name: Final RAG Validation Record

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-package-timeout-diagnostic.yml'

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Run final validation script
        shell: bash
        run: bash .rag-final-validation.sh
