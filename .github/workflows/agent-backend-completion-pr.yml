name: Agent Backend Completion Check

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  complete-backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/chat-studio-agent-runtime-20260718
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: backend/go.sum
      - name: Extract and apply backend patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/agent-backend-completion.yml').read_text()
          marker = "          python3 <<'PY'\n"
          start = source.index(marker) + len(marker)
          end = source.index("\n          PY\n", start)
          script = source[start:end]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in script.splitlines())
          Path('/tmp/complete_backend.py').write_text(script + "\n")
          PY
          python3 /tmp/complete_backend.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('backend/internal/api/router.go')
          text = path.read_text()
          for line in (
              '\ttoolRegistry.MustRegister(tools.NewDateTimeTool())\n',
              '\ttoolRegistry.MustRegister(tools.NewUnitConvertTool())\n',
              '\ttoolRegistry.MustRegister(tools.NewPythonAnalysisTool())\n',
          ):
              text = text.replace(line, '', 1)
          path.write_text(text)
          PY
      - name: Format and run focused backend tests
        working-directory: backend
        run: |
          gofmt -w ./cmd ./internal
          export OMNILLM_MASTER_KEY="$(printf '0%.0s' {1..64})"
          set -o pipefail
          {
            go test -v -timeout 2m ./internal/auth
            go test -v -timeout 2m -run '^TestContextWithInvocationScopeMergesInheritedScope$' ./internal/tools
            go test -v -timeout 2m -run '^TestEmitPublishesWithoutLiveCallback$' ./internal/agent
            go test -v -timeout 2m -run '^TestAgentRuntimeMigration$' ./internal/db
            go test -v -timeout 3m -run '^TestAgentRuntimeProductionRoutesAndPolicies$' ./internal/api
          } 2>&1 | tee ../backend-completion.log
      - name: Upload backend completion diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-completion-diagnostics
          path: backend-completion.log
          if-no-files-found: ignore
          retention-days: 7
      - name: Commit backend completion
        run: |
          if git diff --quiet; then
            echo "Backend completion patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "feat(agent): complete backend runtime integration"
          git push origin HEAD:agent/chat-studio-agent-runtime-20260718
