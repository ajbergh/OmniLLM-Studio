name: Chat tool remediation bootstrap

on:
  push:
    branches:
      - fix/chat-tool-lifecycle-reliability-20260721
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'push' || github.event.pull_request.head.ref == 'fix/chat-tool-lifecycle-reliability-20260721')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out remediation branch
        uses: actions/checkout@v4
        with:
          ref: fix/chat-tool-lifecycle-reliability-20260721
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Decode and verify remediation script
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/.remediate_chat_tools.part.* > /tmp/remediate_chat_tools.py.gz.b64
          base64 --decode /tmp/remediate_chat_tools.py.gz.b64 | gzip --decompress > /tmp/remediate_chat_tools.py
          echo '626a1a25c899427b0d72fba5157734e405360e5b65393bd89b49db38852693a7  /tmp/remediate_chat_tools.py' | sha256sum --check
          python -m py_compile /tmp/remediate_chat_tools.py

      - name: Apply remediation
        shell: bash
        run: |
          set -euo pipefail
          sed -i 's|ROOT = Path(__file__).resolve().parents\[1\]|ROOT = Path.cwd()|' /tmp/remediate_chat_tools.py
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/remediate_chat_tools.py')
          content = path.read_text(encoding='utf-8')
          old = '''replace_once(
              "frontend/src/api.ts",
              "import type {\\n",
              "import { SSEDecoder } from './sse';\\nimport type {\\n",
          )'''
          new = '''replace_once(
              "frontend/src/api.ts",
              "import type {\\n  Conversation,",
              "import { SSEDecoder } from './sse';\\nimport type {\\n  Conversation,",
          )'''
          if content.count(old) != 1:
              raise SystemExit(f'expected one api import patch marker, found {content.count(old)}')
          content = content.replace(old, new, 1)
          fixes = {
              r'+ "\n\n[tool result truncated for display]"': r'+ "\\n\\n[tool result truncated for display]"',
              r'+ "\n\n[tool result truncated at the per-turn context limit]"': r'+ "\\n\\n[tool result truncated at the per-turn context limit]"',
              '''write(
              "frontend/src/sse.ts",
              ''' + "'''" + '''export interface SSEMessage {''': '''write(
              "frontend/src/sse.ts",
              r''' + "'''" + '''export interface SSEMessage {''',
              '''write(
              "frontend/src/sse.test.ts",
              ''' + "'''" + '''import { describe, expect, it } from 'vitest';''': '''write(
              "frontend/src/sse.test.ts",
              r''' + "'''" + '''import { describe, expect, it } from 'vitest';''',
              "  constructor(private readonly defaultEvent = 'message') {}": "  private readonly defaultEvent: string;\n\n  constructor(defaultEvent = 'message') {\n    this.defaultEvent = defaultEvent;\n  }",
          }
          for before, after in fixes.items():
              if content.count(before) != 1:
                  raise SystemExit(f'expected one template marker, found {content.count(before)}: {before[:80]}')
              content = content.replace(before, after, 1)
          path.write_text(content, encoding='utf-8')
          PY
          python /tmp/remediate_chat_tools.py
          rm -f backend/internal/tools/executor_policy.go

      - name: Format Go sources
        shell: bash
        run: |
          set -euo pipefail
          gofmt -w \
            backend/internal/api/chat_tool_runtime.go \
            backend/internal/api/chat_tool_runtime_test.go \
            backend/internal/api/message_handler.go \
            backend/internal/api/tool_handler.go \
            backend/internal/tools/approval_broker.go \
            backend/internal/tools/approval_broker_pending.go \
            backend/internal/tools/executor.go \
            backend/internal/tools/inline_approval.go \
            backend/internal/tools/inline_approval_test.go \
            backend/internal/tools/types.go

      - name: Run focused backend tests
        run: cd backend && go test ./internal/tools ./internal/api

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Run frontend unit tests
        run: cd frontend && npm run test:unit

      - name: Run frontend lint
        run: cd frontend && npm run lint

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Commit validated remediation sources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            backend/internal/api/chat_tool_runtime.go \
            backend/internal/api/chat_tool_runtime_test.go \
            backend/internal/api/message_handler.go \
            backend/internal/api/tool_handler.go \
            backend/internal/tools/approval_broker.go \
            backend/internal/tools/approval_broker_pending.go \
            backend/internal/tools/executor.go \
            backend/internal/tools/inline_approval.go \
            backend/internal/tools/inline_approval_test.go \
            backend/internal/tools/types.go \
            frontend/src/api.ts \
            frontend/src/components/ChatView.tsx \
            frontend/src/components/ToolApprovalCenter.tsx \
            frontend/src/components/ToolCallCard.tsx \
            frontend/src/models.ts \
            frontend/src/sse.test.ts \
            frontend/src/sse.ts \
            frontend/src/stores/index.ts \
            frontend/src/types.ts \
            docs/CHAT_TOOL_CALLING_RELIABILITY_2026-07-21.md
          git commit -m 'fix(chat): make tool calling failures observable and resumable'
          git push origin HEAD:fix/chat-tool-lifecycle-reliability-20260721
