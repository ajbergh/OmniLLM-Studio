name: Finalize Playwright contracts

on:
  push:
    branches:
      - agent/full-remediation-20260718

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-remediation-20260718
          fetch-depth: 0
      - name: Use the supported Playwright request context type
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('tests/browser-tools-validation.spec.ts')
          text = path.read_text()
          text = text.replace(
              "import { expect, test, type Page } from '@playwright/test';",
              "import { expect, test, type APIRequestContext, type Page } from '@playwright/test';",
          )
          text = text.replace(
              "async function expectBrowserRoutesAvailable(request: Parameters<Parameters<typeof test>[1]>[0]['request']) {",
              "async function expectBrowserRoutesAvailable(request: APIRequestContext) {",
          )
          path.write_text(text)
          PY
          git rm .github/workflows/repair-playwright-contracts.yml
      - name: Commit final test contracts and remove this helper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/browser-tools-validation.spec.ts .github/workflows/repair-playwright-contracts.yml
          git commit -m "test playwright: finalize isolated browser contracts"
          git push origin HEAD:agent/full-remediation-20260718
