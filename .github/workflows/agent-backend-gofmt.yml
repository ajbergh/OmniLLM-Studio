name: Agent Backend Gofmt

on:
  push:
    branches:
      - agent/chat-studio-agent-runtime-20260718

permissions:
  contents: write

jobs:
  gofmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/chat-studio-agent-runtime-20260718
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Format backend sources
        run: gofmt -w backend/internal/api/router_agent_runtime_integration_test.go
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/internal/api/router_agent_runtime_integration_test.go
          git commit -m "style: format agent runtime router tests"
          git push origin HEAD:agent/chat-studio-agent-runtime-20260718
