name: Agent Branch Go Format Fix

on:
  push:
    branches:
      - agent/chat-studio-agent-runtime-20260718

permissions:
  contents: write

jobs:
  gofmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/chat-studio-agent-runtime-20260718
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: backend/go.sum
      - name: Format Go sources
        working-directory: backend
        run: gofmt -w .
      - name: Commit formatting changes
        run: |
          if git diff --quiet; then
            echo "Go sources are already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "style: apply gofmt to agent runtime"
          git push origin HEAD:agent/chat-studio-agent-runtime-20260718
