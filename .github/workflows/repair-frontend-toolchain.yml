name: Repair frontend toolchain lockfile

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  repair:
    if: ${{ github.event.pull_request.number == 29 && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Regenerate compatible lockfile
        working-directory: frontend
        run: |
          npm install --package-lock-only --ignore-scripts
          npm ci

      - name: Restore permanent CI and commit
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/repair-frontend-toolchain.yml .github/frontend-toolchain-repair-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package.json frontend/package-lock.json .github/workflows/ci.yml .github/workflows/repair-frontend-toolchain.yml .github/frontend-toolchain-repair-trigger
          git commit -m "fix(deps): regenerate compatible frontend lockfile"
          git push origin HEAD
