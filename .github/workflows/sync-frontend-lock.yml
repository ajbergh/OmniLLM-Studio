name: Sync frontend lockfile

on:
  push:
    branches:
      - agent/full-remediation-20260718

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-remediation-20260718
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Synchronize and validate lockfile
        working-directory: frontend
        run: |
          npm install --package-lock-only
          npm ci
          npm run build
          npm audit --audit-level=high
      - name: Commit lockfile
        run: |
          if git diff --quiet -- frontend/package-lock.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          git commit -m "chore frontend: synchronize lockfile"
          git push origin HEAD:agent/full-remediation-20260718
