name: Finalize RAG Documentation and Comments

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-doc-comment-audit.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Apply prepared documentation and comment patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/rag-docs-finalize.yml').read_text()

          def extract(start_name, end_name):
              start = source.index(f'      - name: {start_name}')
              start = source.index('        run: |\n', start) + len('        run: |\n')
              end = source.index(f'\n      - name: {end_name}', start)
              lines = source[start:end].splitlines()
              return '\n'.join(line[10:] if line.startswith('          ') else line for line in lines) + '\n'

          Path('/tmp/rag_update.sh').write_text(extract('Update documentation and comments', 'Audit production comments'))
          Path('/tmp/rag_audit.sh').write_text(extract('Audit production comments', 'Validate branch'))
          PY
          bash /tmp/rag_update.sh
          bash /tmp/rag_audit.sh

      - name: Publish audited documentation and source comments
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/rag-docs-finalize.yml \
            .github/workflows/rag-doc-comment-audit.yml \
            docs/RAG_DOC_COMMENT_AUDIT.md
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'docs(rag): reconcile architecture, operations, and source comments [skip ci]'
          git pull --rebase origin feature/rag-modernization-v2
          git push origin HEAD:feature/rag-modernization-v2

      - name: Validate backend and frontend
        id: validate
        shell: bash
        run: |
          set +e
          mkdir -p backend/cmd/desktop/frontend_dist
          printf '<!doctype html><title>validation placeholder</title>' > backend/cmd/desktop/frontend_dist/index.html

          (cd backend && timeout 15m go test ./...) >/tmp/backend.log 2>&1 &
          backend_pid=$!
          (cd backend && timeout 15m go test -race ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document ./internal/api) >/tmp/race.log 2>&1 &
          race_pid=$!
          (cd frontend && timeout 15m bash -lc 'npm ci && npm run build && npm run lint && npm run test:unit') >/tmp/frontend.log 2>&1 &
          frontend_pid=$!

          wait "$backend_pid"; backend_status=$?
          wait "$race_pid"; race_status=$?
          wait "$frontend_pid"; frontend_status=$?
          git diff --check >/tmp/diffcheck.log 2>&1
          diff_status=$?
          rm -rf backend/cmd/desktop/frontend_dist

          label() { if [ "$1" -eq 0 ]; then printf 'PASS'; elif [ "$1" -eq 124 ]; then printf 'TIMEOUT'; else printf 'FAIL'; fi; }
          python3 - "$(label "$backend_status")" "$(label "$race_status")" "$(label "$frontend_status")" "$(label "$diff_status")" <<'PY'
          from pathlib import Path
          import sys
          path = Path('docs/RAG_BACKEND_VALIDATION.md')
          text = path.read_text()
          rows = f'''| Check | Result |
          |---|---|
          | `go test ./...` | **{sys.argv[1]}** |
          | Focused Go race tests | **{sys.argv[2]}** |
          | Frontend build, lint, and unit tests | **{sys.argv[3]}** |
          | `git diff --check` | **{sys.argv[4]}** |'''
          text = text.replace('<!-- VALIDATION_RESULTS -->', rows)
          path.write_text(text)
          PY

          echo "backend_status=$backend_status" >> "$GITHUB_OUTPUT"
          echo "race_status=$race_status" >> "$GITHUB_OUTPUT"
          echo "frontend_status=$frontend_status" >> "$GITHUB_OUTPUT"
          echo "diff_status=$diff_status" >> "$GITHUB_OUTPUT"

          if [ "$backend_status" -ne 0 ]; then echo '--- backend failures ---'; tail -n 200 /tmp/backend.log; fi
          if [ "$race_status" -ne 0 ]; then echo '--- race failures ---'; tail -n 200 /tmp/race.log; fi
          if [ "$frontend_status" -ne 0 ]; then echo '--- frontend failures ---'; tail -n 200 /tmp/frontend.log; fi
          if [ "$diff_status" -ne 0 ]; then echo '--- diff check failures ---'; cat /tmp/diffcheck.log; fi
          exit 0

      - name: Publish validation matrix
        shell: bash
        run: |
          set -euo pipefail
          git add docs/RAG_BACKEND_VALIDATION.md
          git commit -m 'docs(rag): record final validation matrix [skip ci]'
          git pull --rebase origin feature/rag-modernization-v2
          git push origin HEAD:feature/rag-modernization-v2

      - name: Enforce validation result
        shell: bash
        run: |
          set -euo pipefail
          for value in \
            '${{ steps.validate.outputs.backend_status }}' \
            '${{ steps.validate.outputs.race_status }}' \
            '${{ steps.validate.outputs.frontend_status }}' \
            '${{ steps.validate.outputs.diff_status }}'; do
            if [ "$value" != '0' ]; then
              echo 'One or more validation groups failed; see the committed validation matrix and job log.'
              exit 1
            fi
          done
