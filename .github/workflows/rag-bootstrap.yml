name: Assemble RAG Modernization

on:
  push:
    branches:
      - feature/rag-modernization-v2
    paths:
      - '.rag-bootstrap/**'
      - '.github/workflows/rag-bootstrap.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - name: Assemble source payload
        shell: bash
        run: |
          set -euo pipefail
          cat .rag-bootstrap/part-* > /tmp/rag-modernization.b64
          base64 --decode /tmp/rag-modernization.b64 > /tmp/rag-modernization.tar.gz
          echo 'f67366adc965e8619ba17fcfbccfdba11751d726f166c361d07e5e9c076e51fb  /tmp/rag-modernization.tar.gz' | sha256sum --check -

          rm -f \
            backend/internal/rag/chunker.go \
            backend/internal/rag/context_builder.go \
            backend/internal/rag/embed.go \
            backend/internal/rag/embed_resolver.go \
            backend/internal/rag/retriever_chromem.go \
            backend/internal/rag/store.go \
            backend/internal/filelibrary/extract.go \
            backend/internal/filelibrary/search.go

          tar --extract --gzip --file /tmp/rag-modernization.tar.gz --directory .
          rm -rf .rag-bootstrap .github/workflows/rag-bootstrap.yml

      - name: Format and validate generated tree
        shell: bash
        run: |
          set -euo pipefail
          test -z "$(gofmt -l backend/internal/api/attachment_text.go backend/internal/document backend/internal/filelibrary/rag_v2.go backend/internal/rag backend/internal/repository/document_chunk.go backend/internal/repository/rag_index.go backend/internal/websearch/orchestrator.go)"

      - name: Commit assembled implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(rag): implement provider-neutral hybrid RAG modernization'
          git push origin HEAD:feature/rag-modernization-v2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/go.sum

      - name: Backend validation
        working-directory: backend
        run: |
          go test ./...
          go test -race ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document
