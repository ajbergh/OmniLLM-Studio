name: Assemble RAG Modernization

on:
  pull_request:
    branches:
      - main
    paths:
      - '.rag-bootstrap/**'
      - '.github/workflows/rag-bootstrap.yml'

permissions:
  contents: write

jobs:
  assemble:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - name: Diagnose source payload
        shell: bash
        run: |
          set +e
          cat .rag-bootstrap/part-* > /tmp/rag-modernization.b64
          combined_bytes=$(wc -c < /tmp/rag-modernization.b64)
          base64 --decode --ignore-garbage /tmp/rag-modernization.b64 > /tmp/rag-modernization.tar.gz
          decode_status=$?
          archive_bytes=$(wc -c < /tmp/rag-modernization.tar.gz)
          archive_sha=$(sha256sum /tmp/rag-modernization.tar.gz | cut -d' ' -f1)
          gzip -t /tmp/rag-modernization.tar.gz
          gzip_status=$?
          tar --list --gzip --file /tmp/rag-modernization.tar.gz >/tmp/rag-tar-list.txt 2>/tmp/rag-tar-error.txt
          tar_status=$?
          {
            echo "combined_base64_bytes=${combined_bytes}"
            echo "decode_status=${decode_status}"
            echo "archive_bytes=${archive_bytes}"
            echo "archive_sha256=${archive_sha}"
            echo "gzip_status=${gzip_status}"
            echo "tar_status=${tar_status}"
            echo "tar_error=$(tr '\n' ' ' </tmp/rag-tar-error.txt)"
            echo "expected_base64_bytes=64756"
            echo "expected_archive_bytes=48566"
            echo "expected_archive_sha256=f67366adc965e8619ba17fcfbccfdba11751d726f166c361d07e5e9c076e51fb"
          } > .rag-bootstrap/diagnostic.txt

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .rag-bootstrap/diagnostic.txt
          git commit -m 'build(rag): record bootstrap diagnostics [skip ci]'
          git push origin HEAD:feature/rag-modernization-v2
