      - name: Commit operational completion
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(rag): complete operational and distributed RAG releases'
          git push origin HEAD:feature/rag-modernization-v2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/go.sum

      - name: Validate backend
        working-directory: backend
        run: |
          mkdir -p cmd/desktop/frontend_dist
          printf '<!doctype html><title>test</title>' > cmd/desktop/frontend_dist/index.html
          go test ./...
          go test -race ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document ./internal/api
