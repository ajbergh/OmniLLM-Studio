name: Build and Publish Container Images

# This workflow is ADDITIVE — it does not replace or modify the legacy Wails
# / web binary builds in release.yml. Container images are published to GHCR
# alongside the existing GitHub Releases.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/docker/**'
      - 'deploy/helm/**'
      - '.github/workflows/container.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'deploy/docker/**'
      - '.github/workflows/container.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write   # required for cosign keyless signing

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: deploy/docker/Dockerfile.backend
          - image: frontend
            dockerfile: deploy/docker/Dockerfile.frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always 2>/dev/null || echo dev)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/omnillm-studio-${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: '1'
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.docker_meta.outputs.tags }}
        run: |
          set -eu
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done

  helm-lint:
    name: Helm chart lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Helm lint
        run: helm lint deploy/helm/omnillm-studio

      - name: Helm template (defaults)
        run: helm template test deploy/helm/omnillm-studio > /tmp/rendered-default.yaml

      - name: Helm template (split topology)
        run: |
          helm template test deploy/helm/omnillm-studio \
            --set topology=split \
            --set secrets.encryptionKey=$(printf '0%.0s' {1..64}) \
            > /tmp/rendered-split.yaml

      - name: Helm template (replicaCount=2 must fail)
        run: |
          if helm template test deploy/helm/omnillm-studio --set replicaCount=2 > /dev/null 2>&1; then
            echo "Expected helm template to fail with replicaCount=2 (chart is single-writer)" >&2
            exit 1
          fi

      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered
          path: /tmp/rendered-*.yaml
          if-no-files-found: ignore
