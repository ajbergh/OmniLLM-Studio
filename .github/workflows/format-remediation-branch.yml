name: Format remediation branch

on:
  push:
    branches:
      - agent/full-remediation-20260718

permissions:
  contents: write

concurrency:
  group: format-remediation-branch
  cancel-in-progress: false

jobs:
  gofmt:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-remediation-20260718
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
      - name: Format Go sources
        run: gofmt -w backend
      - name: Commit canonical formatting
        run: |
          if git diff --quiet -- backend; then
            echo "Go sources already formatted"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend
          git commit -m "style go: apply canonical formatting"
          git push origin HEAD:agent/full-remediation-20260718
