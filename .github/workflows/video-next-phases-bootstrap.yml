name: Video next phases bootstrap

on:
  workflow_dispatch:
  push:
    branches:
      - feature/video-renderer-reliability-transcription-scalability-20260720

permissions:
  contents: write
  issues: read

concurrency:
  group: video-next-phases-bootstrap
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: feature/video-renderer-reliability-transcription-scalability-20260720
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Reconstruct implementation script
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/31/comments" \
            --jq '.[] | select(.body | startswith("BOOTSTRAP_XZ_CHUNK_")) | .body | @base64' \
            > /tmp/video-comment-chunks
          python - <<'PY'
          import base64
          import json
          import lzma
          from pathlib import Path

          chunks: dict[str, str] = {}
          for encoded in Path('/tmp/video-comment-chunks').read_text(encoding='utf-8').splitlines():
              if not encoded.strip():
                  continue
              body = base64.b64decode(json.loads(encoded)).decode('utf-8')
              marker, data = body.split('\n', 1)
              chunks[marker.removeprefix('BOOTSTRAP_XZ_CHUNK_')] = data.strip()

          for path in sorted(Path('scripts/video_phase_chunks').glob('xz-*.b64')):
              chunks[path.stem.removeprefix('xz-')] = path.read_text(encoding='utf-8').strip()

          expected = ['00', '01', '02', '03']
          missing = [key for key in expected if key not in chunks]
          if missing:
              raise SystemExit(f'missing bootstrap chunks: {missing}')

          compressed = base64.b64decode(''.join(chunks[key] for key in expected))
          script = lzma.decompress(compressed)
          target = Path('scripts/apply_video_next_phases.py')
          target.write_bytes(script)
          compile(script, str(target), 'exec')
          print(f'reconstructed {target} ({len(script)} bytes)')
          PY

      - name: Apply phases A through E
        run: |
          set -euo pipefail
          python scripts/apply_video_next_phases.py
          rm -rf scripts/video_phase_chunks
          rm -f scripts/apply_video_next_phases.py
          rm -f .github/workflows/video-next-phases-bootstrap.yml

      - name: Format backend
        run: |
          set -euo pipefail
          cd backend
          gofmt -w internal/video internal/repository internal/models internal/api internal/db cmd/desktop

      - name: Validate backend
        run: |
          set -euo pipefail
          cd backend
          go test ./...

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Validate frontend
        run: |
          set -euo pipefail
          cd frontend
          npm run lint
          npm run test:unit
          npm run build

      - name: Commit implementation
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'feat(video): implement renderer reliability and scalability program'
          git push origin HEAD:feature/video-renderer-reliability-transcription-scalability-20260720
