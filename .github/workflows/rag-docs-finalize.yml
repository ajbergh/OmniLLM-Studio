      - name: Enforce validation result
        shell: bash
        run: |
          set -euo pipefail
          status=0
          for value in \
            '${{ steps.validate.outputs.backend_status }}' \
            '${{ steps.validate.outputs.race_status }}' \
            '${{ steps.validate.outputs.frontend_status }}' \
            '${{ steps.validate.outputs.diff_status }}'; do
            if [ "$value" != '0' ]; then status=1; fi
          done
          if [ "$status" -ne 0 ]; then
            echo 'One or more validation groups failed; see the committed validation matrix and this job log.'
            exit 1
          fi
