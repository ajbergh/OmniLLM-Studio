name: Finalize RAG Documentation and Comments

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-docs-finalize.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Update documentation and comments
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          cat >/tmp/finalize_rag_docs.py <<'PY'
          from pathlib import Path
          import re

          BRANCH = 'feature/rag-modernization-v2'

          def read(path):
              return Path(path).read_text()

          def write(path, text):
              Path(path).write_text(text)

          def replace_once(path, old, new):
              text = read(path)
              if old not in text:
                  raise RuntimeError(f'missing replacement anchor in {path}: {old[:120]!r}')
              text = text.replace(old, new, 1)
              write(path, text)

          def insert_comment(path, needle, comment):
              text = read(path)
              if comment in text:
                  return
              if needle not in text:
                  raise RuntimeError(f'missing declaration in {path}: {needle!r}')
              text = text.replace(needle, comment + '\n' + needle, 1)
              write(path, text)

          def add_overview(path, overview):
              target = Path(path)
              if not target.exists():
                  return
              text = target.read_text()
              marker = '// File overview:'
              if marker in '\n'.join(text.splitlines()[:12]):
                  return
              match = re.match(r'(package\s+\w+\n)', text)
              if not match:
                  raise RuntimeError(f'package declaration not found in {path}')
              text = text[:match.end()] + '\n' + marker + ' ' + overview + '\n' + text[match.end():]
              target.write_text(text)

          overviews = {
              'backend/internal/api/attachment_text.go': 'centralizes attachment MIME eligibility and structure-preserving text extraction for conversation RAG indexing.',
              'backend/internal/api/rag_admin_v2.go': 'implements administrator-facing RAG footprint reporting and full indexed-conversation rebuild operations.',
              'backend/internal/api/rag_handler.go': 'contains public conversation and attachment RAG HTTP handlers.',
              'backend/internal/api/rag_reindex_v2.go': 'orchestrates non-destructive attachment and conversation reindexing.',
              'backend/internal/document/document.go': 'implements the shared pure-Go structured document parser and Markdown renderer.',
              'backend/internal/filelibrary/rag_v2.go': 'contains File Library extraction compatibility helpers and hybrid retrieval.',
              'backend/internal/rag/rag_admin_v2.go': 'provides deterministic administrative snapshots of chromem physical collections.',
              'backend/internal/rag/rag_chunk_context_v2.go': 'implements deterministic chunking, token estimation, and bounded evidence planning.',
              'backend/internal/rag/rag_embedding_v2.go': 'defines embedding-space identity, provider resolution, batching, normalization, and retry behavior.',
              'backend/internal/rag/rag_eval_v2.go': 'provides retrieval-quality metrics and stage-level telemetry helpers.',
              'backend/internal/rag/rag_remote_v2.go': 'adapts VectorIndex to a bearer-token-protected standard-library HTTP transport.',
              'backend/internal/rag/rag_retrieval_v2.go': 'implements fusion, diversity, optional planning/reranking, request evidence bridging, and hybrid conversation retrieval.',
              'backend/internal/rag/rag_store_v2.go': 'manages embedding-space-isolated chromem collections used by the default RAG runtime.',
              'backend/internal/rag/rag_vector_v2.go': 'defines backend-neutral vector generations plus exact, HNSW, and generation-coordination implementations.',
              'backend/internal/repository/document_chunk.go': 'persists document chunks and provides FTS5/BM25 retrieval with a bounded lexical fallback.',
              'backend/internal/repository/document_chunk_replace.go': 'atomically activates replacement chunk sets for one attachment.',
              'backend/internal/repository/rag_index.go': 'creates and persists RAG v2 embedding-space, generation, job, and telemetry state.',
              'backend/internal/websearch/orchestrator.go': 'combines live web evidence with previously assembled private RAG evidence without weakening trust boundaries.',
          }
          for path, overview in overviews.items():
              add_overview(path, overview)

          # Parser and structural-node comments.
          parser_comments = [
              ('\tNodeDocument  NodeType = "document"', '\t// NodeDocument identifies a whole-document structural node.'),
              ('\tNodePage      NodeType = "page"', '\t// NodePage identifies text associated with one source page.'),
              ('\tNodeSlide     NodeType = "slide"', '\t// NodeSlide identifies text associated with one presentation slide.'),
              ('\tNodeSheet     NodeType = "sheet"', '\t// NodeSheet identifies text associated with one workbook sheet.'),
              ('\tNodeHeading   NodeType = "heading"', '\t// NodeHeading identifies a heading and its hierarchy path.'),
              ('\tNodeParagraph NodeType = "paragraph"', '\t// NodeParagraph identifies prose or list-item text.'),
              ('\tNodeTable     NodeType = "table"', '\t// NodeTable identifies text extracted from a table region.'),
              ('\tNodeCode      NodeType = "code"', '\t// NodeCode identifies preformatted or source-code text.'),
              ('func NormalizeMIMEType(mime string) string {', '// NormalizeMIMEType removes parameters and returns a lowercase canonical MIME type.'),
              ('func IsTextMIME(mime string) bool {', '// IsTextMIME reports whether the parser can treat a MIME type as textual content.'),
          ]
          for needle, comment in parser_comments:
              insert_comment('backend/internal/document/document.go', needle, comment)

          chunk_comments = [
              ('const ChunkerSchemaVersion = 2', '// ChunkerSchemaVersion identifies the persisted deterministic chunk format.\nconst ChunkerSchemaVersion = 2'),
          ]
          path = 'backend/internal/rag/rag_chunk_context_v2.go'
          text = read(path)
          if '// ChunkerSchemaVersion identifies' not in text:
              text = text.replace('const ChunkerSchemaVersion = 2', chunk_comments[0][1], 1)
              write(path, text)
          for needle, comment in [
              ('func DefaultChunkOptions() ChunkOptions {', '// DefaultChunkOptions returns the production defaults for target size and overlap.'),
              ('func DetectAndChunk(text, mimeType, attachmentID, conversationID string, opts ChunkOptions) []models.DocumentChunk {', '// DetectAndChunk selects Markdown-aware or plain-text chunking from MIME type and structural markers.'),
              ('func (ConservativeTokenEstimator) Count(text string) int {', '// Count returns a conservative provider-neutral token estimate for text.'),
              ('func NewContextPlanner(estimator TokenEstimator) *ContextPlanner {', '// NewContextPlanner creates a planner and substitutes the conservative estimator when estimator is nil.'),
          ]:
              insert_comment(path, needle, comment)

          insert_comment('backend/internal/rag/rag_embedding_v2.go',
                         'func ProviderHasEmbeddings(providerType string) bool {',
                         '// ProviderHasEmbeddings reports whether the provider type has an embedding implementation in llm.Service.')

          for needle, comment in [
              ('func NewRetrievalTelemetry() *RetrievalTelemetry {', '// NewRetrievalTelemetry starts a UTC-timestamped telemetry measurement.'),
              ('func (t *RetrievalTelemetry) TotalDuration() time.Duration {', '// TotalDuration returns elapsed wall-clock time since telemetry creation, or zero for an uninitialized value.'),
          ]:
              insert_comment('backend/internal/rag/rag_eval_v2.go', needle, comment)

          remote_comments = [
              ('func NewHTTPVectorIndex(baseURL, token string) *HTTPVectorIndex {', '// NewHTTPVectorIndex creates a remote adapter with a 60-second default HTTP timeout.'),
              ('func (h *HTTPVectorIndex) CreateGeneration(ctx context.Context, spec IndexSpec) error {', '// CreateGeneration asks the remote index owner to create an immutable generation.'),
              ('func (h *HTTPVectorIndex) UpsertBatch(ctx context.Context, generationID string, records []VectorRecord) error {', '// UpsertBatch sends vector records to an existing remote generation.'),
              ('func (h *HTTPVectorIndex) Search(ctx context.Context, generationID string, query []float32, topK int) ([]VectorHit, error) {', '// Search queries one remote generation and returns its ranked nearest-neighbor hits.'),
              ('func (h *HTTPVectorIndex) Delete(ctx context.Context, generationID string, ids []string) error {', '// Delete removes the supplied record IDs from one remote generation.'),
              ('func (h *HTTPVectorIndex) Validate(ctx context.Context, generationID string) (IndexStats, error) {', '// Validate requests structural statistics for one remote generation.'),
              ('func (h *HTTPVectorIndex) Drop(ctx context.Context, generationID string) error {', '// Drop removes one remote generation and all of its vector records.'),
          ]
          for needle, comment in remote_comments:
              insert_comment('backend/internal/rag/rag_remote_v2.go', needle, comment)

          retrieval_comments = [
              ('func NewLLMQueryPlanner(service chatCompleter) *LLMQueryPlanner {', '// NewLLMQueryPlanner creates an optional query planner backed by a chat-completion service.'),
              ('func (planner *LLMQueryPlanner) Plan(', '// Plan rewrites a conversational query and returns a deterministic original-query fallback on any planning failure.'),
              ('type Reranker interface {', '// Reranker reorders retrieval candidates for a query while preserving stable candidate IDs.'),
              ('func NewLLMReranker(service chatCompleter, provider, model string) *LLMReranker {', '// NewLLMReranker creates an optional provider-backed passage reranker.'),
              ('func (reranker *LLMReranker) Rerank(ctx context.Context, query string, candidates []RerankCandidate, limit int) ([]RerankResult, error) {', '// Rerank asks the configured model to score candidates and falls back to fused-score order when output is unusable.'),
              ('func NewChromemRetriever(llmService *llm.Service, chunkRepo *repository.ChunkRepo, vectorStore *VectorStore) *ChromemRetriever {', '// NewChromemRetriever creates the default hybrid conversation retriever.'),
              ('func (r *ChromemRetriever) WithLegacyEmbeddingRepo(repo *repository.EmbeddingRepo) *ChromemRetriever {', '// WithLegacyEmbeddingRepo enables compatibility migration for legacy, un-fingerprinted embedding collections.'),
          ]
          for needle, comment in retrieval_comments:
              insert_comment('backend/internal/rag/rag_retrieval_v2.go', needle, comment)

          vector_comments = [
              ('func NewExactVectorIndex() *ExactVectorIndex {', '// NewExactVectorIndex creates an in-memory exact-search backend with no generations.'),
              ('func (i *ExactVectorIndex) CreateGeneration(_ context.Context, spec IndexSpec) error {', '// CreateGeneration creates an empty exact-search generation after validating its embedding space.'),
              ('func (i *ExactVectorIndex) UpsertBatch(_ context.Context, generationID string, records []VectorRecord) error {', '// UpsertBatch validates, normalizes, copies, and inserts records into an exact-search generation.'),
              ('func (i *ExactVectorIndex) Search(_ context.Context, generationID string, query []float32, topK int) ([]VectorHit, error) {', '// Search performs deterministic exhaustive cosine search over an exact-search generation.'),
              ('func (i *ExactVectorIndex) Delete(_ context.Context, generationID string, ids []string) error {', '// Delete removes record IDs from an exact-search generation and ignores missing generations.'),
              ('func (i *ExactVectorIndex) Validate(_ context.Context, generationID string) (IndexStats, error) {', '// Validate checks record dimensions and returns exact-search generation statistics.'),
              ('func (i *ExactVectorIndex) Drop(_ context.Context, generationID string) error {', '// Drop removes an exact-search generation.'),
              ('func NewHNSWVectorIndex(config HNSWConfig) *HNSWVectorIndex {', '// NewHNSWVectorIndex creates an in-memory HNSW backend with normalized configuration defaults.'),
              ('func (h *HNSWVectorIndex) CreateGeneration(_ context.Context, spec IndexSpec) error {', '// CreateGeneration creates an empty HNSW generation after validating its embedding space.'),
              ('func (h *HNSWVectorIndex) UpsertBatch(ctx context.Context, generationID string, records []VectorRecord) error {', '// UpsertBatch validates and inserts or replaces records while maintaining reciprocal HNSW links.'),
              ('func (h *HNSWVectorIndex) Search(ctx context.Context, generationID string, query []float32, topK int) ([]VectorHit, error) {', '// Search performs approximate cosine nearest-neighbor search using the configured EFSearch breadth.'),
              ('func (h *HNSWVectorIndex) Delete(_ context.Context, generationID string, ids []string) error {', '// Delete tombstones record IDs and reselects the entry point when necessary.'),
              ('func (h *HNSWVectorIndex) Validate(_ context.Context, generationID string) (IndexStats, error) {', '// Validate checks dimensions, level metadata, and neighbor references for an HNSW generation.'),
              ('func (h *HNSWVectorIndex) Drop(_ context.Context, generationID string) error {', '// Drop removes an HNSW generation.'),
              ('func NewGenerationCoordinator(repo *repository.RAGIndexRepo, backend VectorIndex) *GenerationCoordinator {', '// NewGenerationCoordinator binds generation metadata persistence to a VectorIndex backend.'),
              ('type BuildGenerationRequest struct {', '// BuildGenerationRequest describes one replacement generation build and activation.'),
              ('type BuildGenerationResult struct {', '// BuildGenerationResult identifies the activated generation and its validated statistics.'),
              ('func (c *GenerationCoordinator) BuildAndActivate(ctx context.Context, req BuildGenerationRequest) (*BuildGenerationResult, error) {', '// BuildAndActivate builds, validates, and atomically activates a replacement generation, cleaning it up on failure.'),
          ]
          for needle, comment in vector_comments:
              insert_comment('backend/internal/rag/rag_vector_v2.go', needle, comment)

          repository_comments = [
              ('func NewChunkRepo(db *sql.DB) *ChunkRepo {', '// NewChunkRepo creates a chunk repository and ensures the RAG v2/FTS schema is available.'),
              ('func (r *ChunkRepo) Create(c *models.DocumentChunk) error {', '// Create persists one chunk, assigning its ID, timestamps, and default metadata when absent.'),
              ('func (r *ChunkRepo) CreateBatch(chunks []models.DocumentChunk) error {', '// CreateBatch persists chunks in one transaction and assigns shared creation timestamps.'),
              ('func (r *ChunkRepo) ListByAttachment(attachmentID string) ([]models.DocumentChunk, error) {', '// ListByAttachment returns chunks for one attachment in chunk order.'),
              ('func (r *ChunkRepo) ListByConversation(conversationID string) ([]models.DocumentChunk, error) {', '// ListByConversation returns conversation chunks ordered by attachment and chunk index.'),
              ('func (r *ChunkRepo) ListByLibraryFileID(libraryFileID string) ([]models.DocumentChunk, error) {', '// ListByLibraryFileID returns chunks for one File Library record in chunk order.'),
              ('func (r *ChunkRepo) GetByIDs(ids []string) ([]models.DocumentChunk, error) {', '// GetByIDs returns existing chunks for the supplied IDs without requiring input-order preservation.'),
              ('func (r *ChunkRepo) DeleteByAttachment(attachmentID string) error {', '// DeleteByAttachment removes all relational chunks associated with an attachment.'),
              ('func (r *ChunkRepo) DeleteByConversation(conversationID string) error {', '// DeleteByConversation removes all relational chunks associated with a conversation.'),
              ('func (r *ChunkRepo) DeleteByLibraryFileID(libraryFileID string) error {', '// DeleteByLibraryFileID removes all relational chunks associated with a File Library record.'),
              ('func (r *ChunkRepo) DistinctConversationIDsWithChunks() ([]string, error) {', '// DistinctConversationIDsWithChunks lists conversation IDs that currently own persisted chunks.'),
              ('func (r *ChunkRepo) CountByAttachment(attachmentID string) (int, error) {', '// CountByAttachment returns the persisted chunk count for one attachment.'),
          ]
          for needle, comment in repository_comments:
              insert_comment('backend/internal/repository/document_chunk.go', needle, comment)

          index_comments = [
              ('func NewRAGIndexRepo(db *sql.DB) (*RAGIndexRepo, error) {', '// NewRAGIndexRepo creates a generation metadata repository after ensuring its schema.'),
              ('type RAGEmbeddingSpaceRecord struct {', '// RAGEmbeddingSpaceRecord is the persisted representation of one immutable embedding space.'),
              ('func (r *RAGIndexRepo) UpsertEmbeddingSpace(space RAGEmbeddingSpaceRecord) (string, error) {', '// UpsertEmbeddingSpace creates or refreshes an embedding-space record keyed by fingerprint.'),
              ('func (r *RAGIndexRepo) EnsureIndex(logicalName, scopeType, scopeID, backend string) (string, error) {', '// EnsureIndex creates or updates the logical index for a scope and returns its stable ID.'),
              ('func (r *RAGIndexRepo) BeginGeneration(indexID, embeddingSpaceID string, parserVersion, chunkerVersion, expectedChunks int) (string, error) {', '// BeginGeneration creates a queued immutable generation with its expected chunk count.'),
              ('func (r *RAGIndexRepo) UpdateGeneration(id, status string, indexedChunks int, errorMessage *string) error {', '// UpdateGeneration records a valid lifecycle state, indexed count, and optional error.'),
              ('func (r *RAGIndexRepo) CreateIngestJob(generationID, libraryFileID, attachmentID string) (string, error) {', '// CreateIngestJob creates a queued ingestion job linked to optional generation and source IDs.'),
              ('func (r *RAGIndexRepo) UpdateIngestJob(id, status, stage string, progress float64, completedChunks int, errorMessage *string) error {', '// UpdateIngestJob clamps progress and records stage, completion count, timestamps, and errors.'),
          ]
          for needle, comment in index_comments:
              insert_comment('backend/internal/repository/rag_index.go', needle, comment)

          for needle, comment in [
              ('func NewOrchestrator(provider Provider, llmSvc *llm.Service, jinaReader *JinaReader) *Orchestrator {', '// NewOrchestrator creates a web-search orchestrator with an optional Jina Reader enricher.'),
              ('func (o *Orchestrator) Reconfigure(provider Provider, jinaReader *JinaReader) {', '// Reconfigure atomically replaces the live search provider and reader configuration.'),
              ('func (o *Orchestrator) DirectSearch(ctx context.Context, request SearchRequest) (*SearchResponse, error) {', '// DirectSearch executes a search request without classification or LLM summarization.'),
          ]:
              insert_comment('backend/internal/websearch/orchestrator.go', needle, comment)

          # Correct stale handler comments and compile defect.
          handler = read('backend/internal/api/rag_handler.go')
          handler = handler.replace('\t"log"\n', '', 1)
          handler = handler.replace(
              '// Reindex re-chunks and re-embeds all text attachments for a conversation.',
              '// Reindex non-destructively rebuilds every supported attachment in a conversation, preserving prior searchable data for failed attachments.',
              1,
          )
          handler = handler.replace(
              '// ReindexAll drops every chromem collection so the next query against each\n// conversation triggers a lazy re-migration from legacy SQL embeddings (or\n// returns empty if none exist). Admin-only — wired in router under /rag/reindex-all.',
              '// ReindexAll non-destructively rebuilds every conversation that currently has persisted chunks and reports per-conversation failures.',
              1,
          )
          write('backend/internal/api/rag_handler.go', handler)

          admin = read('backend/internal/api/rag_admin_v2.go')
          admin = admin.replace(
              '// Repair non-destructively rebuilds all conversations that currently have chunks.',
              '// Repair non-destructively rebuilds every conversation that currently has persisted chunks; it does not limit work to detected inconsistencies.',
              1,
          )
          write('backend/internal/api/rag_admin_v2.go', admin)

          # Update tests for normalized cosine vectors.
          embed_test = read('backend/internal/rag/embed_test.go')
          if '"math"' not in embed_test:
              embed_test = embed_test.replace('\t"errors"\n', '\t"errors"\n\t"math"\n', 1)
          embed_test = embed_test.replace(
              'if len(got) != 3 || got[0] != 0.1 {',
              'if len(got) != 3 || math.Abs(float64(got[0])-0.26726124) > 1e-6 {',
              1,
          )
          embed_test = embed_test.replace(
              'if len(got) != 1 || got[0] != 0.5 {',
              'if len(got) != 1 || math.Abs(float64(got[0])-1.0) > 1e-6 {',
              1,
          )
          write('backend/internal/rag/embed_test.go', embed_test)

          # Frontend top-of-file responsibilities and accurate rebuild wording.
          for path, line in {
              'frontend/src/components/SettingsPanel.tsx': '// SettingsPanel renders provider, application, RAG health, and administrative maintenance settings.',
              'frontend/src/types.ts': '// types.ts defines frontend contracts shared by API clients, stores, and UI components.',
          }.items():
              text = read(path)
              if not text.startswith(line):
                  write(path, line + '\n' + text)

          panel = read('frontend/src/components/SettingsPanel.tsx')
          panel = panel.replace(
              'Check every indexed conversation and rebuild inconsistent indexes? Valid indexes remain available throughout the repair.',
              'Rebuild every currently indexed conversation using the active parser, chunking, and embedding settings? Existing indexes remain available until each replacement succeeds.',
          )
          panel = panel.replace('Repaired ${result.conversations_repaired}', 'Rebuilt ${result.conversations_repaired}')
          panel = panel.replace('Non-destructive index repair and rebuild', 'Non-destructive indexed-conversation rebuilds')
          panel = panel.replace('Repair Indexes', 'Rebuild Indexed Conversations')
          write('frontend/src/components/SettingsPanel.tsx', panel)

          modernization = '''# RAG Modernization Architecture

## Purpose

OmniLLM-Studio's RAG modernization keeps the backend pure Go while improving embedding correctness, document structure, hybrid retrieval, context safety, and operational visibility. Chat generation and embedding generation can use different configured provider profiles.

## Default runtime architecture

The application runtime used by conversation attachments and the File Library is:

```text
Attachment or File Library source
  -> shared structural parser
  -> deterministic structure-aware chunks
  -> SQLite document_chunks + FTS5/BM25
  -> batched, normalized embeddings
  -> embedding-space-isolated chromem collection
  -> vector candidates + lexical candidates
  -> reciprocal-rank fusion and source diversity
  -> token-budgeted untrusted-evidence context
  -> chat or grounded web summarization
```

SQLite remains authoritative for chunk text, provenance, lexical retrieval, RAG metadata, and operational records. Chromem-go remains the default embedded exact vector store. Physical collection names include a routing fingerprint so vectors produced by incompatible provider/model/task/schema contracts are never queried together.

## Reindex safety

Conversation and attachment reindexing does not delete the active chunk set first. It builds replacement vectors, atomically replaces the attachment's relational chunks, and then removes stale vector IDs. If extraction, embedding, or vector persistence fails before activation, the prior searchable data remains. A conversation rebuild may report partial attachment failures.

`POST /v1/rag/repair` and `POST /v1/rag/reindex-all` currently perform the same full rebuild over every conversation with persisted chunks. The repair endpoint does not yet perform a cheaper inconsistency-only scan.

## Embedding identity and provider selection

An embedding space is identified by provider profile, model, dimensions when known, distance metric, normalization behavior, task types, and schema version. The `rag_embedding_model` setting accepts either a model ID or the advanced `Provider Profile Name::model-id` form. Without an explicit provider pin, an enabled active chat provider is used when compatible; otherwise the first enabled embedding-capable provider in repository order is selected.

Embedding inputs are sent to the selected embedding provider. Use an Ollama or local compatible provider when document text must remain local.

## Parsing and chunking

The shared `internal/document` parser supports text-like formats, HTML, PDF, DOCX, XLSX, and PPTX without an external parser service. It preserves headings, pages when available, slides, sheets, tables, and code blocks in a common structural representation. The deterministic chunker uses content-derived IDs and records parser/chunker metadata for incremental comparison.

## Retrieval and context

SQLite FTS5/BM25 and semantic candidates are fused with reciprocal-rank fusion. Source diversity reduces repeated passages from one document. SQLite builds without FTS5 use a bounded tokenized `LIKE` fallback. Retrieved text is always wrapped as untrusted evidence, assigned stable source labels, deduplicated, and packed into a conservative token budget.

When live web search is triggered, request-scoped private evidence is preserved and supplied to the grounded summarizer rather than discarded.

## Supporting vector components

The branch also provides a backend-neutral `VectorIndex` contract with:

- `ExactVectorIndex`, an in-memory full-recall reference implementation.
- `HNSWVectorIndex`, a pure-Go approximate implementation with validation and gob persistence.
- `HTTPVectorIndex` and `NewVectorIndexHTTPHandler`, a bearer-token-capable HTTP transport for a dedicated index owner.
- `GenerationCoordinator`, which builds and validates immutable generations before changing an active-generation pointer in SQLite.

These components are implemented and tested as library capabilities. The normal desktop/server runtime still uses embedding-space-isolated chromem collections; HNSW, the HTTP adapter, and `GenerationCoordinator` are not selected by runtime configuration or wired into Docker/Helm deployment on this branch.

## Persistence

RAG v2 lazily creates `rag_embedding_spaces`, `rag_indexes`, `rag_index_generations`, `rag_ingest_jobs`, `rag_retrieval_events`, and the `document_chunks_fts` virtual table and triggers.

## Administration

Administrators can use:

- `GET /v1/rag/health` for current settings and relational/vector footprint counts.
- `POST /v1/rag/repair` to rebuild all indexed conversations non-destructively.
- `POST /v1/rag/reindex-all` to rebuild all indexed conversations non-destructively.
- Settings -> RAG for the same health snapshot and rebuild controls.

The health endpoint reports counts, not a proof that every relational chunk has a matching vector. Compare `chunks` and `vector_records` as an operational signal, accounting for multiple embedding spaces or legacy collections.

## Evaluation and benchmarks

The RAG package includes Recall@K, MRR, nDCG@K, hit rate, metric deltas, stage telemetry, exact-search tests, and HNSW recall tests. Run vector benchmarks with:

```bash
cd backend
go test -run '^$' -bench BenchmarkVectorIndexes -benchmem ./internal/rag
```

See [RAG modernization status](RAG_MODERNIZATION_STATUS.md) and [RAG validation](RAG_BACKEND_VALIDATION.md) for branch-specific completion and validation results.
'''
          write('docs/RAG_MODERNIZATION.md', modernization)

          status = '''# RAG Modernization Implementation Status

Branch: `feature/rag-modernization-v2`

## Runtime releases

| Area | Status | Current branch behavior |
|---|---|---|
| Embedding-space isolation | Complete | Provider/model/task/metric/schema routing fingerprints isolate physical chromem collections. |
| Chat/embedding decoupling | Complete | Embedding provider selection can be independent of the chat provider; advanced API configuration supports `Provider Profile::model`. |
| Batched embeddings | Complete | Bounded batches, validation, cosine normalization, retry/backoff, and dimensional consistency checks. |
| Shared parser | Complete | Text-like files, HTML, PDF, DOCX, XLSX, and PPTX use `internal/document`. |
| Deterministic structural chunks | Complete | Stable IDs plus heading/page/slide/sheet metadata and boundary-aware splitting. |
| Hybrid retrieval | Complete | Conversation RAG and File Library combine vector and SQLite FTS5/BM25 candidates using RRF and source diversity. |
| Context planning | Complete | Deduplication, source quotas, conservative token budgeting, stable labels, and untrusted-evidence boundaries. |
| Private evidence plus web | Complete | Request-scoped private evidence is preserved when grounded web summarization runs. |
| Safe attachment/conversation rebuild | Complete | Replacement vectors are built before relational activation; failed attachments retain prior searchable data. |
| Admin health and rebuild UI | Complete | Settings displays footprint counts and exposes full non-destructive rebuild actions. |

## Supporting and opt-in capabilities

| Capability | Status | Integration boundary |
|---|---|---|
| Query rewriting / multi-query planning | Implemented, opt-in API | `LLMQueryPlanner` exists but is not enabled by default in chat retrieval settings. |
| LLM reranking | Implemented, opt-in API | `LLMReranker` exists; RRF and diversity remain the default ranking path. |
| Exact `VectorIndex` | Implemented and tested | Reference in-memory generation backend; default runtime remains chromem-go. |
| HNSW `VectorIndex` | Implemented and tested | Pure-Go ANN with persistence and recall tests; no runtime selector is wired on this branch. |
| HTTP vector adapter | Implemented | Client/server adapter exists; Docker, Helm, discovery, and lifecycle wiring are not included. |
