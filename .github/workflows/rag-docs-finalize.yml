      - name: Audit production comments
        shell: bash
        run: |
          set -euo pipefail
          cat >/tmp/comment_audit.go <<'EOF'
          package main
          import (
            "fmt"
            "go/ast"
            "go/parser"
            "go/token"
            "os"
            "os/exec"
            "reflect"
            "sort"
            "strings"
          )
          func receiverName(expr ast.Expr) string {
            switch value := expr.(type) {
            case *ast.Ident: return value.Name
            case *ast.StarExpr: return receiverName(value.X)
            case *ast.IndexExpr: return receiverName(value.X)
            case *ast.IndexListExpr: return receiverName(value.X)
            }
            return ""
          }
          func firstLine(text string) string {
            text = strings.TrimSpace(text)
            if i := strings.IndexByte(text, '\n'); i >= 0 { text = text[:i] }
            return strings.TrimSpace(text)
          }
          func main() {
            raw, err := exec.Command("git", "diff", "--name-only", "origin/main...HEAD", "--", "*.go").Output()
            if err != nil { panic(err) }
            paths := strings.Fields(string(raw))
            sort.Strings(paths)
            var failures []string
            for _, path := range paths {
              if strings.HasSuffix(path, "_test.go") { continue }
              if _, err := os.Stat(path); err != nil { continue }
              content, _ := os.ReadFile(path)
              head := string(content)
              if len(head) > 800 { head = head[:800] }
              if !strings.Contains(head, "// File overview:") && !strings.Contains(head, "Package ") {
                failures = append(failures, path+": missing accurate top-of-file responsibility comment")
              }
              fset := token.NewFileSet()
              file, err := parser.ParseFile(fset, path, nil, parser.ParseComments)
              if err != nil { failures = append(failures, path+": "+err.Error()); continue }
              for _, decl := range file.Decls {
                switch value := decl.(type) {
                case *ast.FuncDecl:
                  name := value.Name.Name
                  if !ast.IsExported(name) { continue }
                  if value.Recv != nil && len(value.Recv.List) > 0 {
                    recv := receiverName(value.Recv.List[0].Type)
                    if recv != "" && !ast.IsExported(recv) { continue }
                  }
                  doc := ""; if value.Doc != nil { doc = firstLine(value.Doc.Text()) }
                  if !strings.HasPrefix(doc, name) { failures = append(failures, fmt.Sprintf("%s:%d: %s comment must start with symbol name", path, fset.Position(value.Pos()).Line, name)) }
                case *ast.GenDecl:
                  for _, spec := range value.Specs {
                    var names []*ast.Ident
                    var doc *ast.CommentGroup
                    switch item := spec.(type) {
                    case *ast.TypeSpec: names = []*ast.Ident{item.Name}; doc = item.Doc; if doc == nil { doc = value.Doc }
                    case *ast.ValueSpec: names = item.Names; doc = item.Doc; if doc == nil { doc = value.Doc }
                    default: continue
                    }
                    for _, ident := range names {
                      if !ast.IsExported(ident.Name) { continue }
                      line := ""; if doc != nil { line = firstLine(doc.Text()) }
                      if !strings.HasPrefix(line, ident.Name) { failures = append(failures, fmt.Sprintf("%s:%d: %s comment must start with symbol name", path, fset.Position(ident.Pos()).Line, ident.Name)) }
                    }
                  }
                }
              }
            }
            if len(failures) > 0 {
              for _, item := range failures { fmt.Fprintln(os.Stderr, item) }
              os.Exit(1)
            }
            fmt.Printf("comment audit passed for %d changed Go paths (%s)\n", len(paths), reflect.TypeOf(paths))
          }
          EOF
          go run /tmp/comment_audit.go

      - name: Validate branch
        id: validate
        shell: bash
        run: |
          set +e
          mkdir -p backend/cmd/desktop/frontend_dist
          printf '<!doctype html><title>validation placeholder</title>' > backend/cmd/desktop/frontend_dist/index.html

          (cd backend && go test ./...) >/tmp/backend.log 2>&1
          backend_status=$?
          (cd backend && go test -race ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document ./internal/api) >/tmp/race.log 2>&1
          race_status=$?
          (cd frontend && npm ci && npm run build && npm run lint && npm run test:unit) >/tmp/frontend.log 2>&1
          frontend_status=$?
          git diff --check >/tmp/diffcheck.log 2>&1
          diff_status=$?
          rm -rf backend/cmd/desktop/frontend_dist

          label() { if [ "$1" -eq 0 ]; then printf 'PASS'; else printf 'FAIL'; fi; }
          python3 - "$(label "$backend_status")" "$(label "$race_status")" "$(label "$frontend_status")" "$(label "$diff_status")" <<'PY'
          from pathlib import Path
          import sys
          path = Path('docs/RAG_BACKEND_VALIDATION.md')
          text = path.read_text()
          rows = f'''| Check | Result |\n|---|---|\n| `go test ./...` | **{sys.argv[1]}** |\n| Focused Go race tests | **{sys.argv[2]}** |\n| Frontend build, lint, and unit tests | **{sys.argv[3]}** |\n| `git diff --check` | **{sys.argv[4]}** |'''
          text = text.replace('<!-- VALIDATION_RESULTS -->', rows)
          path.write_text(text)
          PY

          printf 'backend_status=%s\n' "$backend_status" >> "$GITHUB_OUTPUT"
          printf 'race_status=%s\n' "$race_status" >> "$GITHUB_OUTPUT"
          printf 'frontend_status=%s\n' "$frontend_status" >> "$GITHUB_OUTPUT"
          printf 'diff_status=%s\n' "$diff_status" >> "$GITHUB_OUTPUT"
          exit 0

