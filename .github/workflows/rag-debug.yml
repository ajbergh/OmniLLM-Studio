name: RAG Debug Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/rag-debug.yml'

permissions:
  contents: write

jobs:
  validate:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache-dependency-path: backend/go.sum

      - name: Capture validation output
        shell: bash
        run: |
          set +e
          cd backend
          go test ./... >/tmp/rag-go-test.log 2>&1
          test_status=$?
          go test -race ./internal/rag ./internal/repository ./internal/filelibrary ./internal/document >/tmp/rag-race-test.log 2>&1
          race_status=$?
          cd ..
          {
            echo '# RAG Validation Diagnostic'
            echo
            echo "go_test_status=${test_status}"
            echo "race_test_status=${race_status}"
            echo
            echo '## go test ./...'
            echo '```text'
            tail -n 500 /tmp/rag-go-test.log
            echo '```'
            echo
            echo '## focused race tests'
            echo '```text'
            tail -n 500 /tmp/rag-race-test.log
            echo '```'
          } > docs/RAG_TEST_FAILURE.md

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/RAG_TEST_FAILURE.md
          git commit -m 'build(rag): record validation diagnostic [skip ci]'
          git push origin HEAD:feature/rag-modernization-v2
