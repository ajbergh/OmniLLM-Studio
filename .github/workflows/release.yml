name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux / amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for `git describe --tags`

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          chmod +x scripts/build-linux.sh
          ./scripts/build-linux.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLLM-Studio-linux-amd64
          path: build/bin/OmniLLM-Studio
          if-no-files-found: error

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS / arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh

      - name: Package .app bundle as zip
        run: |
          cd build/bin
          if [ -d OmniLLM-Studio.app ]; then
            zip -r OmniLLM-Studio-macos-arm64.zip OmniLLM-Studio.app
          else
            # Fallback for plain binary output
            zip OmniLLM-Studio-macos-arm64.zip OmniLLM-Studio
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLLM-Studio-macos-arm64
          path: build/bin/OmniLLM-Studio-macos-arm64.zip
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows / amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
        shell: pwsh

      - name: Build
        run: scripts\build-windows.bat
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLLM-Studio-windows-amd64
          path: build\bin\OmniLLM-Studio.exe
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List downloaded files
        run: find dist -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          generate_release_notes: true
          files: |
            dist/OmniLLM-Studio-linux-amd64/OmniLLM-Studio
            dist/OmniLLM-Studio-macos-arm64/OmniLLM-Studio-macos-arm64.zip
            dist/OmniLLM-Studio-windows-amd64/OmniLLM-Studio.exe
