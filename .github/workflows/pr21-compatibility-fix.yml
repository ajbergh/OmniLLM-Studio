name: PR21 Compatibility Fix

on:
  push:
    branches:
      - dependabot/npm_and_yarn/frontend/frontend-production-dependencies-bc5d9a50f4
    paths:
      - .github/pr21-fix-trigger

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: dependabot/npm_and_yarn/frontend/frontend-production-dependencies-bc5d9a50f4
          fetch-depth: 0
      - name: Apply Lucide compatibility rename
        run: sed -i 's/, Trophy, Github, Calculator,/, Trophy, GitHub as Github, Calculator,/' frontend/src/components/SettingsPanel.tsx
      - name: Commit source fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/src/components/SettingsPanel.tsx
          git diff --cached --quiet && exit 0
          git commit -m "fix(frontend): adapt GitHub icon import for Lucide 1.x"
          git push origin HEAD:dependabot/npm_and_yarn/frontend/frontend-production-dependencies-bc5d9a50f4
