name: Diagnose RAG Administration UI

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/rag-ui-completion.yml'

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: feature/rag-modernization-v2

      - name: Record transformation markers
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          types = Path('frontend/src/types.ts').read_text()
          api = Path('frontend/src/api.ts').read_text()
          panel = Path('frontend/src/components/SettingsPanel.tsx').read_text()

          old_types = '''export interface ReindexResponse {
            conversation_id: string;
            chunks_created: number;
            embeddings_stored: number;
          }

          export interface IndexAttachmentResponse {
            attachment_id: string;
            chunks_created: number;
            embeddings_stored: number;
          }'''
          old_api = '''  reindexAll: () =>
            apiFetch<{ conversations_dropped: number; note: string }>('/rag/reindex-all', {
              method: 'POST',
            }),'''
          settings_effect = '''  useEffect(() => {
            setRagEnabled(settings.rag_enabled ?? false);
            setEmbeddingModel(settings.rag_embedding_model ?? RAG_DEFAULTS.embeddingModel);
            setChunkSize(settings.rag_chunk_size ?? RAG_DEFAULTS.chunkSize);
            setChunkOverlap(settings.rag_chunk_overlap ?? RAG_DEFAULTS.chunkOverlap);
            setTopK(settings.rag_top_k ?? RAG_DEFAULTS.topK);
          }, [settings]);'''

          rag_start = panel.find('function RAGTab()')
          maintenance = panel.find('      {/* Maintenance — admin only */}', rag_start)
          music = panel.find('\n// ============================================\n// Music Studio Settings Tab', rag_start)
          tail = panel.rfind('\n    </div>\n  );\n}', maintenance, music) if maintenance >= 0 and music >= 0 else -1

          checks = {
            'types_block': old_types in types,
            'api_block': old_api in api,
            'api_import_anchor': '  IndexAttachmentResponse,\n' in api,
            'panel_import_anchor': "MCPTransport, OpenRouterMetadata, ToolPolicy, UpdateMCPServerRequest } from '../types';" in panel,
            'panel_state_anchor': '  const [advancedOpen, setAdvancedOpen] = useState(false);' in panel,
            'settings_effect': settings_effect in panel,
            'reindex_function': '  const handleReindexAll = async () =>' in panel,
            'rag_start': rag_start >= 0,
            'maintenance_start': maintenance >= 0,
            'music_marker': music >= 0,
            'function_tail': tail >= 0,
          }
          lines = ['# RAG UI transformation diagnostic', '']
          lines.extend(f'- {name}: {value}' for name, value in checks.items())
          lines.extend(['', f'- rag_start_offset: {rag_start}', f'- maintenance_offset: {maintenance}', f'- music_offset: {music}', f'- tail_offset: {tail}'])
          Path('docs/RAG_UI_DIAGNOSTIC.md').write_text('\n'.join(lines) + '\n')
          PY

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/RAG_UI_DIAGNOSTIC.md
          git commit -m 'build(rag): record UI transformation diagnostic [skip ci]'
          git push origin HEAD:feature/rag-modernization-v2
