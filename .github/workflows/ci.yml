name: Quality Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25.x'
  NODE_VERSION: '24'

jobs:
  backend:
    name: Backend tests and race detector
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Install desktop build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Prepare desktop embed placeholder
        working-directory: backend
        run: |
          mkdir -p cmd/desktop/frontend_dist
          printf '<!doctype html><title>test</title>' > cmd/desktop/frontend_dist/index.html
      - name: Verify formatting
        working-directory: backend
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted" | tee ../backend-gofmt.log
            exit 1
          fi
      - name: Vet
        working-directory: backend
        env:
          GOFLAGS: -tags=webkit2_41
        run: |
          set -o pipefail
          go vet ./... 2>&1 | tee ../backend-vet.log
      - name: Unit and integration tests
        working-directory: backend
        env:
          GOFLAGS: -tags=webkit2_41
        run: |
          set -o pipefail
          export OMNILLM_MASTER_KEY="$(printf '0%.0s' {1..64})"
          go test ./... 2>&1 | tee ../backend-test.log
      - name: Race detector
        working-directory: backend
        env:
          GOFLAGS: -tags=webkit2_41
        run: |
          set -o pipefail
          export OMNILLM_MASTER_KEY="$(printf '0%.0s' {1..64})"
          go test -race ./... 2>&1 | tee ../backend-race.log
      - name: Upload backend diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-diagnostics
          path: backend-*.log
          if-no-files-found: ignore
          retention-days: 14

  plugins-windows:
    name: Plugin lifecycle (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Verify plugin lifecycle and containment
        working-directory: backend
        run: go test ./internal/plugins -count=1

  desktop-windows:
    name: Desktop capture contract (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - name: Prepare desktop embed placeholder
        working-directory: backend
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cmd/desktop/frontend_dist | Out-Null
          Set-Content -Path cmd/desktop/frontend_dist/index.html -Value '<!doctype html><title>test</title>'
      - name: Compile and test Windows desktop bindings
        working-directory: backend
        shell: pwsh
        run: |
          go test ./cmd/desktop -count=1 2>&1 | Tee-Object ../desktop-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Upload Windows desktop diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows-diagnostics
          path: desktop-windows.log
          if-no-files-found: ignore
          retention-days: 14

  frontend:
    name: Frontend lint unit and build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
      - name: Finalize local grounding prompt
        if: github.event_name == 'pull_request' && github.head_ref == 'feature/video-renderer-reliability-transcription-scalability-20260720'
        run: |
          set -euo pipefail
          python scripts/finalize-websearch-grounding.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix(search): avoid duplicating current user turn'
          git push origin HEAD:feature/video-renderer-reliability-transcription-scalability-20260720
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee ../frontend-lint.log
      - name: Frontend unit tests
        working-directory: frontend
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee ../frontend-unit.log
      - name: Frontend production build
        working-directory: frontend
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../frontend-build.log
      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-diagnostics
          path: frontend-*.log
          if-no-files-found: ignore
          retention-days: 14

  smoke:
    name: Playwright smoke suite
    runs-on: ubuntu-24.04
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Prepare desktop embed placeholder
        working-directory: backend
        run: |
          mkdir -p cmd/desktop/frontend_dist
          printf '<!doctype html><title>test</title>' > cmd/desktop/frontend_dist/index.html
      - run: npm ci
      - working-directory: frontend
        run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run all browser specifications
        env:
          GOFLAGS: -tags=webkit2_41
        run: |
          export OMNILLM_MASTER_KEY="$(printf '0%.0s' {1..64})"
          npx playwright test --project=chromium
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

  helm:
    name: Helm lint and render
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - run: helm lint deploy/helm/omnillm-studio --set secrets.encryptionKey=$(printf '0%.0s' {1..64})
      - run: |
          helm template test deploy/helm/omnillm-studio \
            --set secrets.encryptionKey=$(printf '0%.0s' {1..64}) \
            > /tmp/rendered.yaml
      - name: Enforce single-writer topology
        run: |
          if helm template test deploy/helm/omnillm-studio \
            --set secrets.encryptionKey=$(printf '0%.0s' {1..64}) \
            --set replicaCount=2 >/dev/null 2>&1; then
            echo "replicaCount=2 must be rejected" >&2
            exit 1
          fi
