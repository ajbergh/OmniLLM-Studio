name: Agent Backend Completion

on:
  push:
    branches:
      - agent/chat-studio-agent-runtime-20260718

permissions:
  contents: write

jobs:
  complete-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: agent/chat-studio-agent-runtime-20260718
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: backend/go.sum
      - name: Apply backend composition and lifecycle patch
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"anchor not found in {path}: {old[:120]!r}")
              p.write_text(text.replace(old, new, 1))

          # Solo mode needs a stable owner identity for newly user-scoped runtime data.
          replace_once(
              "backend/internal/auth/auth.go",
              '''func UserIDFromContext(ctx context.Context) string {
          \tif user := UserFromContext(ctx); user != nil {
          \t\treturn user.ID
          \t}
          \treturn ""
          }
          ''',
              '''func UserIDFromContext(ctx context.Context) string {
          \tif user := UserFromContext(ctx); user != nil {
          \t\treturn user.ID
          \t}
          \treturn ""
          }

          // LocalScopeUserID is the stable owner used by user-scoped subsystems when
          // OmniLLM-Studio is running in its default local solo mode without accounts.
          const LocalScopeUserID = "local"

          // ScopeUserIDFromContext returns the authenticated user ID, or a stable
          // local owner ID in solo mode. Use this only behind the authenticated route
          // group (where solo-mode bypass has already been evaluated).
          func ScopeUserIDFromContext(ctx context.Context) string {
          \tif userID := UserIDFromContext(ctx); userID != "" {
          \t\treturn userID
          \t}
          \treturn LocalScopeUserID
          }
          ''')

          # Overlay invocation metadata without discarding inherited user/workspace scope.
          replace_once(
              "backend/internal/tools/context.go",
              '''func ContextWithInvocationScope(ctx context.Context, scope InvocationScope) context.Context {
          \tif scope.UserID == "" {
          \t\tscope.UserID = auth.UserIDFromContext(ctx)
          \t}
          \tif scope.ConversationID == "" {
          \t\tscope.ConversationID = chi.URLParamFromCtx(ctx, "conversationId")
          \t}
          \treturn context.WithValue(ctx, invocationScopeContextKey{}, scope)
          }
          ''',
              '''func ContextWithInvocationScope(ctx context.Context, scope InvocationScope) context.Context {
          \tinherited, _ := ctx.Value(invocationScopeContextKey{}).(InvocationScope)
          \tif scope.UserID == "" {
          \t\tscope.UserID = inherited.UserID
          \t}
          \tif scope.WorkspaceID == "" {
          \t\tscope.WorkspaceID = inherited.WorkspaceID
          \t}
          \tif scope.ConversationID == "" {
          \t\tscope.ConversationID = inherited.ConversationID
          \t}
          \tif scope.MessageID == "" {
          \t\tscope.MessageID = inherited.MessageID
          \t}
          \tif scope.RunID == "" {
          \t\tscope.RunID = inherited.RunID
          \t}
          \tif scope.UserID == "" {
          \t\tscope.UserID = auth.ScopeUserIDFromContext(ctx)
          \t}
          \tif scope.ConversationID == "" {
          \t\tscope.ConversationID = chi.URLParamFromCtx(ctx, "conversationId")
          \t}
          \treturn context.WithValue(ctx, invocationScopeContextKey{}, scope)
          }
          ''')
