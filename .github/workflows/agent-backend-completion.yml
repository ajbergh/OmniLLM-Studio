          \ttoolRegistry.MustRegister(tools.NewAppCatalogTool(appService))
          \ttoolRegistry.MustRegister(tools.NewAppConnectionsTool(appService))
          \ttoolRegistry.MustRegister(tools.NewAppConnectMCPTool(appService))
          \ttoolRegistry.MustRegister(tools.NewAppDisconnectTool(appService))
          \ttoolRegistry.MustRegister(tools.NewImageGenerateJobTool(jobManager, llmService, attachRepo, cfg.AttachmentsDir))
          \ttoolRegistry.MustRegister(tools.NewArtifactGenerateJobTool(jobManager, artifactGen, attachRepo))
          \ttoolRegistry.MustRegister(tools.NewWebSearchTool(orchestrator, "", ""))
          ''')
          replace_once(
              "backend/internal/api/router.go",
              '''\tagentRunRepo := repository.NewAgentRunRepo(database)
          \tagentStepRepo := repository.NewAgentStepRepo(database)
