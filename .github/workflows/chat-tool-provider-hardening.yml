name: Chat tool provider hardening

on:
  push:
    branches:
      - feat/chat-tool-provider-conformance-observability-20260721

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/chat-tool-provider-conformance-observability-20260721
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Patch protocol hardening
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{path}: expected one marker, found {count}: {old[:120]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'backend/internal/llm/service.go',
              '''\t\t\t\t\tif err := json.Unmarshal([]byte(payload), &chunk); err != nil {\n\t\t\t\t\t\tcontinue // skip malformed chunks\n\t\t\t\t\t}''',
              '''\t\t\t\t\tif err := json.Unmarshal([]byte(payload), &chunk); err != nil {\n\t\t\t\t\t\treturn &ProviderRequestError{Provider: providerType, Code: "PROVIDER_STREAM_PROTOCOL_ERROR", RequestID: requestID, UpstreamRequestID: upstreamRequestID, Retryable: false, Cause: err}\n\t\t\t\t\t}''',
          )
          replace_once(
              'backend/internal/llm/service.go',
              '''\t\tif err != nil {\n\t\t\treturn fmt.Errorf("read stream: %w", err)\n\t\t}\n\t}\n\n\treturn nil\n}\n\n// isImageCapableProvider''',
              '''\t\tif err != nil {\n\t\t\treturn &ProviderRequestError{Provider: providerType, Code: "PROVIDER_STREAM_READ_ERROR", RequestID: requestID, UpstreamRequestID: upstreamRequestID, Retryable: retryableProviderTransportError(err), Cause: err}\n\t\t}\n\t}\n\n\treturn &ProviderRequestError{Provider: providerType, Code: "PROVIDER_STREAM_INTERRUPTED", RequestID: requestID, UpstreamRequestID: upstreamRequestID, Retryable: true}\n}\n\n// isImageCapableProvider''',
          )
          replace_once(
              'backend/internal/tools/executor.go',
              '''func sideEffectCacheKey(scope InvocationScope, call ToolCall) string {\n\treturn strings.Join([]string{scope.UserID, scope.WorkspaceID, scope.ConversationID, scope.MessageID, call.ID, call.Name, string(call.Arguments)}, "\\x00")\n}''',
              '''const maxSideEffectReplayEntries = 1024\n\nfunc sideEffectCacheKey(scope InvocationScope, call ToolCall) string {\n\t// A stable provider call ID identifies one side effect. Deliberately exclude\n\t// arguments so an approval-edited invocation is still protected if the model\n\t// repeats the original call after approval.\n\treturn strings.Join([]string{scope.UserID, scope.WorkspaceID, scope.ConversationID, scope.MessageID, call.ID, call.Name}, "\\x00")\n}''',
          )
          replace_once(
              'backend/internal/tools/executor.go',
              '''\te.idempotencyMu.Lock()\n\tdefer e.idempotencyMu.Unlock()\n\te.idempotency[sideEffectCacheKey(scope, call)] = cloneToolResult(result)\n}''',
              '''\te.idempotencyMu.Lock()\n\tdefer e.idempotencyMu.Unlock()\n\tif len(e.idempotency) >= maxSideEffectReplayEntries {\n\t\t// The cache is a short-lived duplicate-execution guard, not durable state.\n\t\t// Resetting at the cap keeps server memory bounded while preserving safety\n\t\t// for the current working set of calls.\n\t\te.idempotency = make(map[string]*ToolResult)\n\t}\n\te.idempotency[sideEffectCacheKey(scope, call)] = cloneToolResult(result)\n}''',
          )
          PY
          gofmt -w backend/internal/llm/service.go backend/internal/tools/executor.go

      - name: Validate focused backend
        run: cd backend && go test ./internal/llm ./internal/tools ./internal/api

      - name: Commit hardening
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add backend/internal/llm/service.go backend/internal/tools/executor.go
          git commit -m 'fix(chat): fail closed on provider stream protocol errors'
          git push origin HEAD:feat/chat-tool-provider-conformance-observability-20260721
