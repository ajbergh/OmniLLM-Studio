  <text x="606" y="82" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">embedding, and semantic</text>
  <text x="606" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">search over your files</text>
