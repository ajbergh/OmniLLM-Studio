  <text x="226" y="320" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Organize conversations,</text>
  <text x="226" y="332" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">member management, and</text>
  <text x="226" y="344" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">role-based access control</text>
  <rect x="226" y="356" width="46" height="14" rx="7" fill="#8b5cf6" fill-opacity="0.12"/>
  <text x="249" y="366" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">teams</text>

  <!-- Plugins -->
  <rect x="404" y="270" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#06b6d4" stroke-width="0.5"/>
  <circle cx="430" cy="296" r="12" fill="#06b6d4" fill-opacity="0.15"/>
  <text x="430" y="300" font-family="system-ui,sans-serif" font-size="14" fill="#06b6d4" text-anchor="middle">🧩</text>
  <text x="448" y="300" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0ff" font-weight="600">Plugin SDK</text>
  <text x="416" y="320" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">JSON-RPC subprocess</text>
  <text x="416" y="332" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">model for extending with</text>
  <text x="416" y="344" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">custom tools and actions</text>
  <rect x="416" y="356" width="62" height="14" rx="7" fill="#06b6d4" fill-opacity="0.12"/>
  <text x="447" y="366" font-family="monospace" font-size="8" fill="#22d3ee" text-anchor="middle">extensible</text>

  <!-- Import/Export -->
  <rect x="594" y="270" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#84cc16" stroke-width="0.5"/>
  <circle cx="620" cy="296" r="12" fill="#84cc16" fill-opacity="0.15"/>
  <text x="620" y="300" font-family="system-ui,sans-serif" font-size="14" fill="#84cc16" text-anchor="middle">💾</text>
  <text x="638" y="300" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0ff" font-weight="600">Import / Export</text>
  <text x="606" y="320" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Full backup and restore</text>
  <text x="606" y="332" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">of conversations, settings,</text>
  <text x="606" y="344" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">and attachments</text>
  <rect x="606" y="356" width="52" height="14" rx="7" fill="#84cc16" fill-opacity="0.12"/>
  <text x="632" y="366" font-family="monospace" font-size="8" fill="#a3e635" text-anchor="middle">bundle</text>
