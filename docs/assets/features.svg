<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 405" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="405" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="405" rx="16" fill="url(#bg)"/>

  <!-- Row 1 -->
  <!-- Streaming -->
  <rect x="24" y="20" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#6366f1" stroke-width="0.5"/>
  <circle cx="50" cy="46" r="12" fill="#6366f1" fill-opacity="0.15"/>
  <text x="50" y="50" font-family="system-ui,sans-serif" font-size="14" fill="#6366f1" text-anchor="middle">⚡</text>
  <text x="68" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0ff" font-weight="600">Streaming Chat</text>
  <text x="36" y="70" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Token-by-token SSE</text>
  <text x="36" y="82" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">responses with real-time</text>
  <text x="36" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">markdown rendering</text>
  <rect x="36" y="106" width="40" height="14" rx="7" fill="#6366f1" fill-opacity="0.12"/>
  <text x="56" y="116" font-family="monospace" font-size="8" fill="#818cf8" text-anchor="middle">SSE</text>

  <!-- Multi-Provider -->
  <rect x="214" y="20" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#a855f7" stroke-width="0.5"/>
  <circle cx="240" cy="46" r="12" fill="#a855f7" fill-opacity="0.15"/>
  <text x="240" y="50" font-family="system-ui,sans-serif" font-size="14" fill="#a855f7" text-anchor="middle">🔌</text>
  <text x="258" y="50" font-family="system-ui,sans-serif" font-size="12" fill="#e0e0ff" font-weight="600">Multi-Provider</text>
  <text x="226" y="70" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">OpenAI, Anthropic, Ollama,</text>
  <text x="226" y="82" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">Groq, Together, Mistral,</text>
  <text x="226" y="94" font-family="system-ui,sans-serif" font-size="9" fill="#6b7280">and any OpenAI-compatible</text>
  <rect x="226" y="106" width="52" height="14" rx="7" fill="#a855f7" fill-opacity="0.12"/>
  <text x="252" y="116" font-family="monospace" font-size="8" fill="#c4b5fd" text-anchor="middle">8+ APIs</text>

  <!-- Image Studio -->
  <rect x="404" y="20" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#f472b6" stroke-width="0.5"/>
  <circle cx="430" cy="46" r="12" fill="#f472b6" fill-opacity="0.15"/>
  <text x="430" y="50" font-family="system-ui,sans-serif" font-size="14" fill="#f472b6" text-anchor="middle">🎨</text>
