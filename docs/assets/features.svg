  <rect x="594" y="20" width="180" height="110" rx="12" fill="#1e1e3f" stroke="#f59e0b" stroke-width="0.5"/>
  <circle cx="620" cy="46" r="12" fill="#f59e0b" fill-opacity="0.15"/>
  <text x="620" y="50" font-family="system-ui,sans-serif" font-size="14" fill="#f59e0b" text-anchor="middle">📚</text>
