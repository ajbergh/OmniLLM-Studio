<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 120" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">OmniLLM-Studio banner</title>
  <desc id="desc">Project banner with product name and local-first tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#081120"/>
      <stop offset="100%" stop-color="#13233a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="420" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e2f8ff"/>
      <stop offset="100%" stop-color="#b9ecff"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="800" height="120" rx="16" fill="url(#bg)"/>

  <g transform="translate(30,22)" filter="url(#shadow)">
    <rect width="74" height="74" rx="18" fill="#0f2238" stroke="#2e587c"/>
    <circle cx="22" cy="26" r="6" fill="#4fd1c5"/>
    <circle cx="38" cy="26" r="6" fill="#22d3ee"/>
    <circle cx="30" cy="42" r="6" fill="#67e8f9"/>
    <circle cx="52" cy="42" r="6" fill="#a5f3fc"/>
    <path d="M22 26 L38 26 M22 26 L30 42 M38 26 L52 42 M30 42 L52 42" stroke="url(#accent)" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <rect x="14" y="55" width="46" height="4" rx="2" fill="#4fd1c5" opacity="0.35"/>
  </g>

  <text x="122" y="58" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="url(#text-grad)">OmniLLM-Studio</text>
  <text x="122" y="82" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8fb2cf" letter-spacing="0.4">Local-first LLM chat · Multi-provider · Streaming · Private</text>

  <rect x="620" y="38" width="150" height="34" rx="17" fill="#10263f" stroke="#2f6f8b"/>
  <text x="695" y="59" font-family="Consolas, monospace" font-size="12" fill="#8ee3f0" text-anchor="middle">backend + frontend</text>
</svg>
